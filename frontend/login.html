<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hinova DW Monitor · Login</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080b10;
      --surface: #0d1117;
      --card: #111720;
      --border: #1e2d3d;
      --border2: #243448;
      --accent: #00d4ff;
      --green: #00ff9d;
      --red: #ff4d6a;
      --text: #e2e8f0;
      --text2: #8fa4bf;
      --text3: #4a6280;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Syne', sans-serif;
    }
    .login-container { width: 100%; max-width: 400px; padding: 20px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px; font-weight: 700; color: var(--accent);
      letter-spacing: 6px; text-transform: uppercase;
    }
    .login-subtitle {
      font-size: 12px; color: var(--text3);
      letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
    }
    .login-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px;
    }
    .login-field { margin-bottom: 20px; }
    .login-label {
      display: block; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text3); margin-bottom: 8px;
    }
    .login-input-wrap { position: relative; }
    .login-input {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border2); border-radius: 10px;
      color: var(--text); font-family: 'JetBrains Mono', monospace;
      font-size: 14px; padding: 12px 16px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; box-sizing: border-box;
    }
    .login-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    }
    .login-input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(255,77,106,0.1);
    }
    .toggle-password {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%); cursor: pointer;
      color: var(--text3); font-size: 16px; user-select: none;
      transition: color 0.2s;
    }
    .toggle-password:hover { color: var(--text2); }
    .login-btn {
      width: 100%; padding: 13px; border-radius: 10px;
      background: rgba(0,255,157,0.1); border: 1px solid rgba(0,255,157,0.3);
      color: var(--green); font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; letter-spacing: 1px; margin-top: 8px;
    }
    .login-btn:hover:not(:disabled) {
      background: rgba(0,255,157,0.18);
      box-shadow: 0 0 24px rgba(0,255,157,0.15);
    }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-btn.loading {
      background: rgba(0,212,255,0.08);
      border-color: rgba(0,212,255,0.3); color: var(--accent);
    }
    .login-error {
      display: none; margin-top: 16px; padding: 10px 14px;
      background: rgba(255,77,106,0.08); border: 1px solid rgba(255,77,106,0.2);
      border-radius: 8px; font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--red);
    }
    .login-footer {
      text-align: center; margin-top: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--text3);
    }
  </style>
</head>
<body>
  <div style="position:fixed;inset:0;background-image:
    linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;"></div>

  <div class="login-container" style="position:relative;z-index:1">
    <div class="login-logo">
      <div class="login-logo-text">HINOVA</div>
      <div class="login-subtitle">Command Center</div>
    </div>

    <div class="login-card">
      <div class="login-field">
        <label class="login-label" for="username">Usuário</label>
        <input class="login-input" type="text" id="username"
               placeholder="seu.usuario" autocomplete="username"
               onkeydown="if(event.key==='Enter') document.getElementById('password').focus()">
      </div>

      <div class="login-field">
        <label class="login-label" for="password">Senha</label>
        <div class="login-input-wrap">
          <input class="login-input" type="password" id="password"
                 placeholder="••••••••" autocomplete="current-password"
                 onkeydown="if(event.key==='Enter') doLogin()">
          <span class="toggle-password" onclick="togglePassword()" id="toggle-icon">👁</span>
        </div>
      </div>

      <button class="login-btn" id="login-btn" onclick="doLogin()">
        Entrar
      </button>

      <div class="login-error" id="login-error"></div>
    </div>

    <div class="login-footer">
      Hinova DW Monitor v1.0 · hinova_dw
    </div>
  </div>

  <script>
    (async function checkExistingSession() {
        const token = localStorage.getItem('dw_monitor_token');
        if (!token) return;
        try {
            const res = await fetch('/api/auth/me', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (res.ok) window.location.href = '/';
        } catch (e) {
            localStorage.removeItem('dw_monitor_token');
            localStorage.removeItem('dw_monitor_user');
        }
    })();

    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('toggle-icon');
        if (input.type === 'password') {
            input.type = 'text'; icon.textContent = '🙈';
        } else {
            input.type = 'password'; icon.textContent = '👁';
        }
    }

    async function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('login-btn');
        const errEl = document.getElementById('login-error');

        if (!username || !password) { showError('Preencha usuário e senha.'); return; }

        btn.disabled = true;
        btn.classList.add('loading');
        btn.textContent = '⟳ Entrando...';
        errEl.style.display = 'none';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (!res.ok) { showError(data.detail || 'Erro ao fazer login.'); return; }

            localStorage.setItem('dw_monitor_token', data.access_token);
            localStorage.setItem('dw_monitor_user', JSON.stringify(data.user));
            window.location.href = '/';

        } catch (e) {
            showError('Erro de conexão. Tente novamente.');
        } finally {
            btn.disabled = false;
            btn.classList.remove('loading');
            btn.textContent = 'Entrar';
        }
    }

    function showError(msg) {
        const errEl = document.getElementById('login-error');
        errEl.textContent = '✕ ' + msg;
        errEl.style.display = 'block';
        document.getElementById('username').classList.add('error');
        document.getElementById('password').classList.add('error');
        ['username','password'].forEach(id => {
            document.getElementById(id).addEventListener('input',
                () => document.getElementById(id).classList.remove('error'),
                { once: true }
            );
        });
    }
  </script>
</body>
</html>
